services:
  postgres-dev:
    image: postgres:16
    container_name: team01-postgres-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DEV_POSTGRES_DB}
      POSTGRES_USER: ${DEV_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - team01-dev-network

  app-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: team01-app-dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-dev:5432/${DEV_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DEV_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${DEV_POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      CUSTOM_JWT_SECRET_KEY: ${CUSTOM_JWT_SECRET_KEY}
    depends_on:
      - postgres-dev
    expose:
      - "8080"
    networks:
      - team01-dev-network

  nginx-dev:
    image: nginx:latest
    container_name: team01-nginx-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-dev
    networks:
      - team01-dev-network

volumes:
  postgres_dev_data:

networks:
  team01-dev-network:
    driver: bridge