services:
  postgres-prod:
    image: postgres:16
    container_name: team01-postgres-prod
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${PROD_POSTGRES_DB}
      POSTGRES_USER: ${PROD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - team01-prod-network

  backend-blue:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: team01-backend-blue
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-prod:5432/${PROD_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${PROD_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${PROD_JWT_SECRET}
    depends_on:
      - postgres-prod
    expose:
      - "8080"
    networks:
      - team01-prod-network

  backend-green:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: team01-backend-green
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-prod:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${PROD_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      CUSTOM_JWT_SECRET_KEY: ${CUSTOM_JWT_SECRET_KEY}
    depends_on:
      - postgres-prod
    expose:
      - "8080"
    networks:
      - team01-prod-network

  nginx-prod:
    image: nginx:latest
    container_name: team01-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-blue
      - backend-green
    networks:
      - team01-prod-network

volumes:
  postgres_prod_data:

networks:
  team01-prod-network:
    driver: bridge