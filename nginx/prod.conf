upstream backend {
    server team01-backend-green:8080;
    # server team01-backend-blue:8080;
}

server {
    listen 80;
    server_name api.kimhss.site;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.kimhss.site;

    ssl_certificate /etc/letsencrypt/live/api.kimhss.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kimhss.site/privkey.pem;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}