upstream backend {
    server backend-blue:8080;
}

server {
    listen 443 ssl;
    server_name api.kimhss.site;

    ssl_certificate /etc/letsencrypt/live/api.kimhss.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kimhss.site/privkey.pem;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# monitoring.kimhss.site → Grafana
server {
    listen 443 ssl;
    server_name monitoring.kimhss.site;

    ssl_certificate /etc/letsencrypt/live/api.kimhss.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kimhss.site/privkey.pem;

    # 팀원 IP만 허용
    # allow 팀원IP/32;
    # deny all;

    location / {
        proxy_pass http://grafana-cloud:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name api.kimhss.site monitoring.kimhss.site;
    return 301 https://$host$request_uri;
}
