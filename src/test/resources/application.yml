spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  mail:
    host: localhost
    port: 3025
    username: test-mail@example.com
    password: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false

custom:
  jwt:
    secret-key: ${CUSTOM_JWT_SECRET_KEY:team01-ai-office-default-secret-key-team01-ai-office-default}
    access-token-expiration-seconds: ${CUSTOM_JWT_ACCESS_EXPIRATION_SECONDS:172800}
    refresh-token-expiration-seconds: ${CUSTOM_JWT_REFRESH_EXPIRATION_SECONDS:604800}
  oauth:
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:test-client-id}
      token-info-base-url: ${GOOGLE_TOKEN_INFO_BASE_URL:https://oauth2.googleapis.com}
  cors:
    allowed-origin-patterns:
      - http://localhost:3000
      - http://localhost:5173
  invite:
    base-url: ${CUSTOM_INVITE_BASE_URL:http://localhost:8080/api/v1/invites}
    email:
      from: ${spring.mail.username}
      from-name: ${CUSTOM_INVITE_EMAIL_FROM_NAME:AI Office}
      subject-prefix: ${CUSTOM_INVITE_EMAIL_SUBJECT_PREFIX:[AI Office]}
  slack:
    client-id: ${SLACK_CLIENT_ID:test-client-id}
    client-secret: ${SLACK_CLIENT_SECRET:test-client-secret}
    signing-secret: ${SLACK_SIGNING_SECRET:test-signing-secret}
    redirect-uri: ${SLACK_REDIRECT_URI:http://localhost:8080/api/v1/slack/oauth/callback}
    oauth-state-secret: ${SLACK_OAUTH_STATE_SECRET:team01-ai-office-default-slack-oauth-state-secret-key}

security:
  encryption:
    tink-keyset: ${ENCRYPTION_SECRET:{"primaryKeyId":123456789,"key":[{"keyData":{"typeUrl":"type.googleapis.com/google.crypto.tink.AesGcmKey","value":"GiAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==","keyMaterialType":"SYMMETRIC"},"status":"ENABLED","keyId":123456789,"outputPrefixType":"TINK"}]}}
  slack:
    replay-timeout-seconds: 300

task-execution:
  workdir-root: ${TASK_EXECUTION_WORKDIR_ROOT:/data/aioffice/workspaces}

app:
  artifact:
    base-path: ${APP_ARTIFACT_BASE_PATH:runtime-workspaces}
    max-file-size-bytes: ${APP_ARTIFACT_MAX_FILE_SIZE_BYTES:1048576}
    max-files-per-result: ${APP_ARTIFACT_MAX_FILES_PER_RESULT:50}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

logging:
  level:
    back: WARN
    org.hibernate: WARN