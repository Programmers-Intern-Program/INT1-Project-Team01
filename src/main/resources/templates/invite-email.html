<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Workspace 초대</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1f2937;">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
        <div style="background-color:#ffffff;border:1px solid #e5e7eb;border-radius:8px;padding:28px;">
            <p style="margin:0 0 8px;font-size:14px;color:#6b7280;">Workspace 초대</p>
            <h1 style="margin:0 0 16px;font-size:22px;line-height:1.4;color:#111827;">{{inviterName}}님이 초대했습니다.</h1>
            <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#374151;">
                <strong>{{workspaceName}}</strong> Workspace에 참여하려면 아래 버튼을 눌러 초대를 수락하세요.
            </p>
            <a href="{{inviteUrl}}" style="display:inline-block;padding:12px 18px;background-color:#2563eb;color:#ffffff;text-decoration:none;border-radius:6px;font-size:14px;font-weight:700;">
                초대 수락하기
            </a>
            <div style="margin-top:24px;padding-top:20px;border-top:1px solid #e5e7eb;">
                <p style="margin:0 0 8px;font-size:13px;color:#4b5563;">초대 역할: <strong>{{role}}</strong></p>
                <p style="margin:0;font-size:13px;color:#4b5563;">만료일: <strong>{{expiresAt}}</strong></p>
            </div>
            <p style="margin:24px 0 0;font-size:12px;line-height:1.6;color:#6b7280;">
                버튼이 동작하지 않으면 아래 링크를 브라우저 주소창에 붙여 넣어 접속하세요.<br>
                <a href="{{inviteUrl}}" style="color:#2563eb;word-break:break-all;">{{inviteUrl}}</a>
            </p>
        </div>
    </div>
</body>
</html>
