spring:
  application:
    name: ai-office
  output:
    ansi:
      enabled: always
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:h2:./test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    show-sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${YOUR_EMAIL_ADDRESS:}
    password: ${YOUR_EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

custom:
  jwt:
    secret-key: ${CUSTOM_JWT_SECRET_KEY:team01-ai-office-default-secret-key-team01-ai-office-default}
    access-token-expiration-seconds: ${CUSTOM_JWT_ACCESS_EXPIRATION_SECONDS:172800}
    refresh-token-expiration-seconds: ${CUSTOM_JWT_REFRESH_EXPIRATION_SECONDS:604800}
  oauth:
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
      token-info-base-url: ${GOOGLE_TOKEN_INFO_BASE_URL:https://oauth2.googleapis.com}
  cors:
    allowed-origin-patterns:
      - http://localhost:3000
      - http://localhost:5173
      - https://int-1-project-team01-fe.vercel.app
      - https://www.kimhss.site
      - https://kimhss.site
  invite:
    base-url: ${CUSTOM_INVITE_BASE_URL:http://localhost:3000/invites}
    email:
      from: ${spring.mail.username}
      from-name: ${CUSTOM_INVITE_EMAIL_FROM_NAME:AI Office}
      subject-prefix: ${CUSTOM_INVITE_EMAIL_SUBJECT_PREFIX:[AI Office]}
  slack:
    client-id: ${SLACK_CLIENT_ID:}
    client-secret: ${SLACK_CLIENT_SECRET:}
    signing-secret: ${SLACK_SIGNING_SECRET:}
    redirect-uri: ${SLACK_REDIRECT_URI:http://localhost:8080/api/v1/slack/oauth/callback}
    oauth-state-secret: ${SLACK_OAUTH_STATE_SECRET:}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

security:
  encryption:
    tink-keyset: ${ENCRYPTION_SECRET}
  slack:
    replay-timeout-seconds: 300

task-execution:
  workdir-root: ${TASK_EXECUTION_WORKDIR_ROOT:/data/aioffice/workspaces}

app:
  artifact:
    base-path: ${APP_ARTIFACT_BASE_PATH:runtime-workspaces}
    max-file-size-bytes: ${APP_ARTIFACT_MAX_FILE_SIZE_BYTES:1048576}
    max-files-per-result: ${APP_ARTIFACT_MAX_FILES_PER_RESULT:50}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

logging:
  level:
    back: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:                          # histogram-buckets
    distribution:
      percentiles-histogram:
        http.server.requests: true